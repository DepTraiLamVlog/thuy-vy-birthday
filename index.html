<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Thúy Vy</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, sans-serif;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
    font-size:40px;
    margin-bottom:10px;
}

.date{
    color:#666;
    font-size:18px;
    margin-bottom:20px;
}

.message{
    font-size:20px;
    line-height:1.6;
    color:#333;
}

.cake{
    font-size:70px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}
</style>
</head>

<body>
    <div class="card">
        <div class="cake">🎂</div>

        <h1>🎉 HAPPY BIRTHDAY 🎉</h1>

        <h2>Thúy Vy ❤️</h2>

        <div class="date">19/06</div>

        <p class="message">
            Chị bé của em sinh nhật vui vẻ nha! 🎁✨<br><br>

            Chúc chị luôn xinh đẹp, vui vẻ, hạnh phúc và gặp thật nhiều may mắn.
            Mong mọi điều tốt đẹp nhất sẽ đến với chị trong tuổi mới.
            Luôn cười thật nhiều và đạt được những điều mình mong muốn nhé! 💖
        </p>
    </div>
</body>
</html>
